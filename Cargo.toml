[package]
name = "lur"
version = "0.1.0"
edition = "2024"

[lib]
name = "lur"
path = "src/lib.rs"

[[bin]]
name = "lur"
path = "src/main.rs"

[dependencies]
base64 = "0.22.1"
clap = { version = "4.6", features = ["derive"] }
mlua = { version = "0.11.6", features = ["luau"] }
serde_json = "1.0.150"
thiserror = "2.0.18"

[dev-dependencies]
assert_cmd = "2.2.2"
criterion = "0.8.2"
predicates = "3.1.4"

[[bench]]
name = "runtime"
harness = false
