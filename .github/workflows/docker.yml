name: Docker

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

# Cancel a superseded run on the same ref.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # No qemu: the Dockerfile builder is pinned to the native platform and zig
      # cross-compiles both musl targets, so the arm64 image needs no emulation.
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # main → :main (rolling dev image); release → :X.Y.Z, :X.Y, and :latest
          # (the latter added automatically for a semver tag via flavor latest=auto).
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      # Resolve the `lur --version` stamp: the published tag for a release,
      # otherwise a `<ref>-<short-sha>` marker (e.g. `main-1a2b3c4`). The Docker
      # context excludes .git, so build.rs can't run `git describe` in-image —
      # the value is computed here and injected as a build-arg.
      - id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamp `lur --version` (see the version step above).
          build-args: |
            GIT_VERSION=${{ steps.version.outputs.value }}
          # Persist BuildKit layer cache across runs via the GitHub Actions cache
          # backend. This caches image layers (apt install, cargo-zigbuild build,
          # zig download) — not the in-Dockerfile cargo/target cache mounts, which
          # are local to an ephemeral runner and don't survive between runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
