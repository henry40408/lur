# cargo-deny configuration — supply-chain checks for the dependency graph.
# Run locally with `cargo deny check`; CI runs the same on every push and PR.

[graph]
# Check the dependency graph for all targets, not just the host's, so a
# platform-specific dependency can't smuggle in a bad license or advisory.
all-features = true

[advisories]
version = 2
# Deny crates with a known security advisory (RUSTSEC) or that have been yanked.
# `ignore` holds advisory IDs we've reviewed and consciously accept.
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive / public-domain-equivalent licenses only — every one of these is
# present in the current graph (verify with `cargo deny list`). LGPL-2.1 is
# intentionally absent: its only appearance is one OR-arm of `r-efi`, satisfied
# here by MIT/Apache-2.0.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are unavoidable transitively (e.g. winnow 0.7 via cron vs
# 1.0 via toml); surface them as a warning, not a hard failure.
multiple-versions = "warn"
wildcards = "deny"

[sources]
# Only crates.io is trusted; an unknown registry or any git source is rejected.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
